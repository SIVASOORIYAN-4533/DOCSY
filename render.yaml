services:
  - type: web
    name: smartdoc-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/health/db
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT_SEARCH_LIMIT
        value: 0
      - key: JWT_SECRET
        sync: false
      - key: DB_PROVIDER
        value: mongodb
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: smartdoc
      - key: FRONTEND_BASE_URL
        sync: false
      - key: OAUTH_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
